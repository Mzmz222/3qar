<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5D4037",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        /* Custom hide spin buttons for number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-slate-100 dark:border-slate-800">
<!-- Top Navigation/Header -->
<div class="flex items-center p-6 pb-2 justify-between border-b border-slate-50 dark:border-slate-800">
<div class="text-primary flex size-10 shrink-0 items-center justify-center rounded-full bg-primary/10 cursor-pointer">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">
                تسجيل دخول الإدارة
            </h2>
</div>
<!-- Branding / Logo Area -->
<div class="flex flex-col items-center pt-10 pb-6 px-6">
<div class="w-24 h-24 mb-6 bg-primary/5 rounded-full flex items-center justify-center border-2 border-primary/20">
<span class="material-symbols-outlined text-primary !text-5xl">domain</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">ماجد النوبي للعقارات</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">نظام إدارة العقارات المتطور</p>
</div>
<!-- PIN Entry Section -->
<div class="px-8 py-6">
<h3 class="text-slate-700 dark:text-slate-300 text-center text-base font-medium mb-8">أدخل رمز PIN المكون من 4 أرقام</h3>
<div class="flex justify-center gap-4 mb-10" dir="ltr">
<input autofocus="" class="w-14 h-16 text-center text-2xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-0 dark:bg-slate-800 dark:text-white transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="w-14 h-16 text-center text-2xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-0 dark:bg-slate-800 dark:text-white transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="w-14 h-16 text-center text-2xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-0 dark:bg-slate-800 dark:text-white transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
<input class="w-14 h-16 text-center text-2xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-700 focus:border-primary focus:ring-0 dark:bg-slate-800 dark:text-white transition-all" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="number"/>
</div>
<!-- Action Button -->
<div class="flex flex-col gap-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>دخول النظام</span>
<span class="material-symbols-outlined">login</span>
</button>
<button class="w-full text-slate-500 dark:text-slate-400 font-medium py-2 text-sm hover:text-primary transition-colors">
                    نسيت رمز الدخول؟
                </button>
</div>
</div>
<!-- Footer Decoration -->
<div class="h-2 bg-primary"></div>
</div>
<!-- Background Pattern -->
<div class="fixed inset-0 -z-10 opacity-5 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-primary rounded-full blur-3xl"></div>
</div>
</body></html>
